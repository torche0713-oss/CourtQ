<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CourtQ Pro - Venue Management</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh; color: #fff;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .landing { width: 100%; max-width: 480px; }
        .logo {
            text-align: center; margin-bottom: 32px;
        }
        .logo-icon { font-size: 3.5rem; margin-bottom: 10px; }
        .logo-text { font-size: 2rem; font-weight: 800; color: #4ecdc4; letter-spacing: -1px; }
        .pro-badge {
            display: inline-block; background: linear-gradient(135deg,#f39c12,#d68910);
            color:#fff; font-size:0.65rem; padding:2px 8px; border-radius:6px;
            font-weight:800; letter-spacing:1px; vertical-align: super; margin-left: 2px;
        }
        .tagline { font-size: 0.85rem; color: #aaa; margin-top: 6px; }

        .card {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 28px; margin-bottom: 16px;
        }

        .tabs { display: flex; margin-bottom: 20px; border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .tab { flex: 1; padding: 10px; text-align: center; background: rgba(255,255,255,0.03); color: #555; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: all 0.3s; border: none; }
        .tab.active { background: rgba(78,205,196,0.15); color: #4ecdc4; }
        .tab:hover:not(.active) { color: #888; }

        .auth-form { display: none; }
        .auth-form.active { display: block; }

        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block; font-size: 0.75rem; color: #aaa;
            margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .form-group input, .form-group select {
            width: 100%; padding: 10px 14px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px; color: #fff; font-size: 0.9rem; transition: all 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none; border-color: #4ecdc4; background: rgba(78,205,196,0.08);
        }
        .form-group input::placeholder { color: #555; }

        .btn {
            padding: 11px 20px; border: none; border-radius: 10px;
            font-size: 0.88rem; font-weight: 700; cursor: pointer;
            transition: all 0.3s; display: inline-flex;
            align-items: center; justify-content: center; gap: 6px;
        }
        .btn-full { width: 100%; justify-content: center; }
        .btn-primary { background: linear-gradient(135deg,#4ecdc4,#44a08d); color:#fff; }
        .btn-primary:hover { transform:translateY(-1px); box-shadow:0 6px 16px rgba(78,205,196,0.4); }
        .btn-outline { background:transparent; border:1px solid rgba(255,255,255,0.2); color:#ccc; }
        .btn-outline:hover { background:rgba(255,255,255,0.08); color:#fff; }
        .btn-success { background: linear-gradient(135deg,#2ecc71,#27ae60); color:#fff; }
        .btn-success:hover { transform:translateY(-1px); box-shadow:0 6px 16px rgba(46,204,113,0.4); }

        .divider { display: flex; align-items: center; gap: 12px; margin: 16px 0; color: #555; font-size: 0.78rem; }
        .divider::before, .divider::after { content: ''; flex: 1; border-top: 1px solid rgba(255,255,255,0.08); }

        .error-msg { background: rgba(231,76,60,0.12); border: 1px solid rgba(231,76,60,0.3); border-radius: 8px; padding: 8px 12px; font-size: 0.78rem; color: #e74c3c; margin-bottom: 12px; display: none; }
        .success-msg { background: rgba(46,204,113,0.12); border: 1px solid rgba(46,204,113,0.3); border-radius: 8px; padding: 8px 12px; font-size: 0.78rem; color: #2ecc71; margin-bottom: 12px; display: none; }

        .features { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .feature { background: rgba(78,205,196,0.06); border: 1px solid rgba(78,205,196,0.15); border-radius: 10px; padding: 12px; text-align: center; font-size: 0.72rem; color: #aaa; }
        .feature-icon { font-size: 1.3rem; display: block; margin-bottom: 4px; }

        @media(max-width:500px) {
            .features { grid-template-columns: 1fr 1fr; }
            .card { padding: 20px; }
        }

        .spinner {
            width: 40px; height: 40px; border-radius: 50%;
            border: 3px solid rgba(78,205,196,0.2);
            border-top-color: #4ecdc4;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin { to{transform:rotate(360deg);} }

        .demo-badge {
            background: rgba(243,156,18,0.1); border: 1px solid rgba(243,156,18,0.25);
            border-radius: 8px; padding: 8px; font-size: 0.72rem; color: #f39c12;
            text-align: center; margin-bottom: 12px; display: none;
        }
        .footer-links {
            text-align: center; margin-top: 24px; padding: 16px 0;
            border-top: 1px solid rgba(255,255,255,0.06);
            font-size: 0.7rem; color: #555;
        }
        .footer-links a {
            color: #777; text-decoration: none; margin: 0 8px;
            transition: color 0.3s; cursor: pointer;
        }
        .footer-links a:hover { color: #4ecdc4; }
        .footer-links .dot { color: #444; }
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.8); z-index: 9999;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: #1a1a2e; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; max-width: 640px; width: 100%;
            max-height: 80vh; overflow-y: auto; padding: 28px;
            position: relative;
        }
        .modal-box h2 {
            font-size: 1.1rem; color: #4ecdc4; margin-bottom: 16px;
            padding-right: 40px;
        }
        .modal-box p, .modal-box li {
            font-size: 0.78rem; color: #aaa; line-height: 1.6; margin-bottom: 8px;
        }
        .modal-box ul { padding-left: 20px; }
        .modal-close {
            position: absolute; top: 16px; right: 16px;
            background: none; border: none; color: #555; font-size: 1.2rem;
            cursor: pointer; transition: color 0.3s;
        }
        .modal-close:hover { color: #fff; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(78,205,196,0.3); border-radius: 4px; }
    </style>
</head>
<body>
    <div class="landing" id="app">
        <div class="logo">
            <div class="logo-icon">🏓</div>
            <div class="logo-text">CourtQ<span class="pro-badge">PRO</span></div>
            <div class="tagline">Smart venue management for pickleball &amp; racket sports</div>
        </div>

        <div class="features">
            <div class="feature"><span class="feature-icon">🏟️</span>Court Management</div>
            <div class="feature"><span class="feature-icon">📅</span>Online Booking</div>
            <div class="feature"><span class="feature-icon">💳</span>POS &amp; Sales</div>
            <div class="feature"><span class="feature-icon">🏆</span>Leaderboards</div>
        </div>

        <div class="card" id="authCard">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Log In</button>
                <button class="tab" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <div id="errorMsg" class="error-msg"></div>
            <div id="successMsg" class="success-msg"></div>
            <div id="demoBadge" class="demo-badge">🔧 Demo mode — data resets periodically</div>

            <!-- LOGIN -->
            <div class="auth-form active" id="form-login">
                <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="you@email.com"></div>
                <div class="form-group"><label>Password</label><input type="password" id="loginPass" placeholder="••••••••"></div>
                <button class="btn btn-primary btn-full" onclick="login()">Log In</button>
                <div class="divider">or</div>
                <button class="btn btn-outline btn-full" onclick="startDemo()">🎮 Try Demo</button>
            </div>

            <!-- SIGNUP -->
            <div class="auth-form" id="form-signup">
                <div class="form-group"><label>Venue Name *</label><input type="text" id="signupVenue" placeholder="e.g. Riverside Pickleball"></div>
                <div class="form-group"><label>Your Name *</label><input type="text" id="signupName" placeholder="e.g. Juan dela Cruz"></div>
                <div class="form-group"><label>Email *</label><input type="email" id="signupEmail" placeholder="you@email.com"></div>
                <div class="form-group"><label>Password *</label><input type="password" id="signupPass" placeholder="At least 6 characters"></div>
                <button class="btn btn-success btn-full" onclick="signup()">Create Venue</button>
                <div class="divider">or</div>
                <button class="btn btn-outline btn-full" onclick="startDemo()">🎮 Try Demo</button>
            </div>
        </div>

        <div id="loadingScreen" style="display:none;text-align:center;padding:40px;">
            <div class="spinner"></div>
            <div style="margin-top:12px;color:#aaa;font-size:0.9rem;" id="loadingMsg">Setting things up...</div>
        </div>

        <div class="footer-links">
            <a onclick="showLegal('about')">About</a><span class="dot"> · </span>
            <a onclick="showLegal('privacy')">Privacy</a><span class="dot"> · </span>
            <a onclick="showLegal('terms')">Terms</a><span class="dot"> · </span>
            <a onclick="showLegal('disclaimer')">Disclaimer</a><span class="dot"> · </span>
            <a onclick="showLegal('contact')">Contact</a>
        </div>
    </div>

    <!-- Legal Modal -->
    <div class="modal-overlay" id="legalModal" onclick="if(event.target===this)closeLegal()">
        <div class="modal-box" id="legalContent"></div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBWqvEMy-q_DJWGYhOJfHsRrFQNl3ZJK9Y",
            authDomain: "courtq-2e744.firebaseapp.com",
            projectId: "courtq-2e744",
            storageBucket: "courtq-2e744.firebasestorage.app",
            messagingSenderId: "4841304416",
            appId: "1:4841304416:web:7a26d85566af1d47d4ee05"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg; el.style.display = 'block';
        }
        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg; el.style.display = 'block';
        }
        function hideMsgs() {
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('successMsg').style.display = 'none';
        }
        function switchTab(tab) {
            hideMsgs();
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            if (tab === 'login') {
                document.querySelector('.tabs button:first-child').classList.add('active');
                document.getElementById('form-login').classList.add('active');
            } else {
                document.querySelector('.tabs button:last-child').classList.add('active');
                document.getElementById('form-signup').classList.add('active');
            }
        }

        function showLoading(msg) {
            document.getElementById('authCard').style.display = 'none';
            document.getElementById('loadingScreen').style.display = 'block';
            document.getElementById('loadingMsg').textContent = msg || 'Loading...';
        }

        async function login() {
            hideMsgs();
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value;
            if (!email || !pass) { showError('Enter email and password.'); return; }
            try {
                await auth.signInWithEmailAndPassword(email, pass);
            } catch (e) {
                showError(e.message);
            }
        }

        async function signup() {
            hideMsgs();
            const venue = document.getElementById('signupVenue').value.trim();
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const pass = document.getElementById('signupPass').value;
            if (!venue || !name || !email || !pass) { showError('Fill in all fields.'); return; }
            if (pass.length < 6) { showError('Password must be at least 6 characters.'); return; }
            showLoading('Creating your venue...');
            try {
                const cred = await auth.createUserWithEmailAndPassword(email, pass);
                const uid = cred.user.uid;
                const slug = venue.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'venue';
                let finalSlug = slug;
                let slugDoc = await db.collection('slugs').doc(finalSlug).get();
                let attempt = 0;
                while (slugDoc.exists) {
                    attempt++;
                    finalSlug = slug + '-' + attempt;
                    slugDoc = await db.collection('slugs').doc(finalSlug).get();
                }
                const venueId = db.collection('venues').doc().id;
                const defaultCourts = [
                    {id:1,name:'Court 1',location:'Main Area',surface:'Hard',env:'Outdoor',color:'#4ecdc4',rate:300,status:'available',players:[],startTime:null,gameType:null,desc:''},
                    {id:2,name:'Court 2',location:'Main Area',surface:'Hard',env:'Outdoor',color:'#3498db',rate:300,status:'available',players:[],startTime:null,gameType:null,desc:''},
                    {id:3,name:'Court 3',location:'East Wing',surface:'Clay',env:'Outdoor',color:'#2ecc71',rate:350,status:'available',players:[],startTime:null,gameType:null,desc:''},
                ];
                await db.collection('venues').doc(venueId).set({
                    ownerId: uid, name: '🏟️ ' + venue, slug: finalSlug, createdAt: Date.now(),
                    courts: defaultCourts, queue: [], soloQueue: [], session: null,
                    bookings: [], history: [], leaderboard: {}, sales: [],
                    nextId: 100, nextBId: 1
                });
                await db.collection('users').doc(uid).set({ email, name, venueId, createdAt: Date.now() });
                await db.collection('slugs').doc(finalSlug).set({ venueId });
                window.location.href = 'admin.html?venue=' + finalSlug;
            } catch (e) {
                document.getElementById('authCard').style.display = 'block';
                document.getElementById('loadingScreen').style.display = 'none';
                showError(e.message);
            }
        }

        async function startDemo() {
            hideMsgs();
            document.getElementById('demoBadge').style.display = 'block';
            showLoading('Creating demo venue...');
            try {
                const slug = 'demo-' + Date.now().toString(36);
                const venueId = db.collection('venues').doc().id;
                const defaultCourts = [
                    {id:1,name:'Court 1',location:'Main Area',surface:'Hard',env:'Outdoor',color:'#4ecdc4',rate:300,status:'available',players:[],startTime:null,gameType:null,desc:''},
                    {id:2,name:'Court 2',location:'Main Area',surface:'Hard',env:'Outdoor',color:'#3498db',rate:300,status:'available',players:[],startTime:null,gameType:null,desc:''},
                    {id:3,name:'Court 3',location:'East Wing',surface:'Clay',env:'Outdoor',color:'#2ecc71',rate:350,status:'available',players:[],startTime:null,gameType:null,desc:''},
                ];
                await db.collection('venues').doc(venueId).set({
                    ownerId: 'demo', name: '🏟️ Demo Venue', slug, createdAt: Date.now(),
                    courts: defaultCourts, queue: [], soloQueue: [], session: null,
                    bookings: [], history: [], leaderboard: {}, sales: [],
                    nextId: 100, nextBId: 1
                });
                await db.collection('slugs').doc(slug).set({ venueId });
                window.location.href = 'admin.html?venue=' + slug;
            } catch (e) {
                document.getElementById('authCard').style.display = 'block';
                document.getElementById('loadingScreen').style.display = 'none';
                showError('Demo failed: ' + e.message);
            }
        }

        // Auto-redirect if already logged in
        auth.onAuthStateChanged(async user => {
            if (user) {
                try {
                    const userDoc = await db.collection('users').doc(user.uid).get();
                    if (userDoc.exists) {
                        const data = userDoc.data();
                        if (data.venueId) {
                            const venueDoc = await db.collection('venues').doc(data.venueId).get();
                            if (venueDoc.exists) {
                                window.location.href = 'admin.html?venue=' + venueDoc.data().slug;
                                return;
                            }
                        }
                    }
                } catch(e) {}
            }
        });
        function closeLegal(){document.getElementById('legalModal').classList.remove('active');}
        function showLegal(page){
            const c=document.getElementById('legalContent');
            const pages={
                about:`<button class="modal-close" onclick="closeLegal()">✕</button><h2>About CourtQ Pro</h2>
                <p>CourtQ Pro is a smart venue management platform built for the Philippine pickleball boom. We provide court booking, queue management, financial tracking, and AI-powered insights for pickleball and racket sports venues.</p>
                <p>Our platform enables venue owners to manage bookings, track finances, and grow their business — all from a single dashboard. Players can discover venues, book courts online, and pay via GCash or Maya.</p>
                <p>Built with ❤️ for the Philippine pickleball community.<br>Business email: <a href="mailto:apexmindagency@gmail.com" style="color:#4ecdc4;">apexmindagency@gmail.com</a></p>`,

                privacy:`<button class="modal-close" onclick="closeLegal()">✕</button><h2>Privacy Policy</h2>
                <p><strong>Information We Collect:</strong> When you create an account or make a booking, we collect your name, email address, phone number, and payment reference numbers. Venue owners provide business information including venue details and payment account information.</p>
                <p><strong>How We Use Your Information:</strong> To process bookings, manage court schedules, process payments via GCash/Maya, communicate booking status, and improve our services.</p>
                <p><strong>Data Storage:</strong> Your data is stored securely in Firebase Firestore (Google Cloud). We retain booking data as needed for business operations and financial records.</p>
                <p><strong>Third-Party Services:</strong> We use Firebase (Google) for authentication and database hosting. Payment references are stored but we do not process payments directly — GCash and Maya handle all financial transactions.</p>
                <p><strong>Your Rights:</strong> You may request access to, correction of, or deletion of your personal data by contacting us at <a href="mailto:apexmindagency@gmail.com" style="color:#4ecdc4;">apexmindagency@gmail.com</a>.</p>
                <p><strong>Cookies:</strong> We use essential cookies for authentication. No tracking or advertising cookies are used.</p>
                <p><em>Last updated: June 2026</em></p>`,

                terms:`<button class="modal-close" onclick="closeLegal()">✕</button><h2>Terms of Service</h2>
                <p><strong>Acceptance:</strong> By using CourtQ Pro, you agree to these terms. If you do not agree, do not use the platform.</p>
                <p><strong>Venue Owners:</strong> You are responsible for the accuracy of your venue information, pricing, and availability. You agree to honor all confirmed bookings made through the platform.</p>
                <p><strong>Players:</strong> You agree to provide accurate information when booking. No-shows or repeated cancellations may result in restricted access at the venue's discretion.</p>
                <p><strong>Payments:</strong> All payments are processed externally via GCash or Maya. CourtQ Pro does not handle or store financial instrument details. Payment reference numbers are stored for verification purposes only.</p>
                <p><strong>Prohibited Uses:</strong> You may not use the platform for any illegal purpose, to harass others, or to disrupt the service.</p>
                <p><strong>Limitation of Liability:</strong> CourtQ Pro is provided "as is." We are not liable for disputes between venues and players, third-party payment issues, or any indirect damages arising from platform use.</p>
                <p><strong>Changes:</strong> We reserve the right to update these terms. Continued use after changes constitutes acceptance.</p>
                <p><em>Last updated: June 2026</em></p>`,

                disclaimer:`<button class="modal-close" onclick="closeLegal()">✕</button><h2>Disclaimer</h2>
                <p><strong>General:</strong> CourtQ Pro provides a platform connecting venue owners with players. We do not own, operate, or manage any of the listed venues.</p>
                <p><strong>Accuracy:</strong> Venue information, pricing, and availability are provided by venue owners. We make no guarantees about accuracy and recommend confirming details directly with the venue.</p>
                <p><strong>Payment:</strong> CourtQ Pro does not process payments. GCash and Maya are third-party services. Any payment disputes must be resolved directly with the venue owner or payment provider.</p>
                <p><strong>Availability:</strong> We strive for 99.9% uptime but do not guarantee uninterrupted service. Scheduled maintenance and unforeseen outages may occur.</p>
                <p><strong>Health & Safety:</strong> Players participate in sports activities at their own risk. Venues are responsible for maintaining safe playing conditions.</p>`,

                contact:`<button class="modal-close" onclick="closeLegal()">✕</button><h2>Contact Us</h2>
                <p><strong>Business Email:</strong> <a href="mailto:apexmindagency@gmail.com" style="color:#4ecdc4;">apexmindagency@gmail.com</a></p>
                <p><strong>Developer:</strong> For technical support, feature requests, or bug reports, email the address above.</p>
                <p><strong>Venue Partnerships:</strong> Interested in listing your venue on CourtQ Pro? Email us for pricing and onboarding.</p>
                <p><strong>Data Privacy Requests:</strong> For data access, correction, or deletion requests, please email us with the subject line "Data Privacy Request."</p>
                <p style="margin-top:16px;font-size:0.72rem;color:#555;">Apex Mind Agency<br>Manila, Philippines</p>`
            };
            c.innerHTML=pages[page]||'<button class="modal-close" onclick="closeLegal()">✕</button><p>Page not found.</p>';
            document.getElementById('legalModal').classList.add('active');
        }
    </script>
</body>
</html>
