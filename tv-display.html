<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CourtQ Live</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0f;color:#fff;font-family:'Inter','Segoe UI',system-ui,sans-serif;overflow-x:hidden;min-height:100vh;}
#app{padding:24px 32px;max-width:1920px;margin:0 auto;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;gap:20px;flex-wrap:wrap;}
.header-left{display:flex;align-items:center;gap:16px;}
.header-left h1{font-size:1.6rem;font-weight:700;background:linear-gradient(135deg,#4ecdc4,#3498db);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.venue-name{font-size:1.1rem;color:#888;}
.clock{font-size:1rem;color:#f39c12;font-weight:600;font-variant-numeric:tabular-nums;}
.session-badge{font-size:0.82rem;padding:6px 14px;border-radius:20px;font-weight:600;}
.session-badge.active{background:rgba(78,205,196,0.15);color:#4ecdc4;border:1px solid rgba(78,205,196,0.3);}
.session-badge.inactive{background:rgba(255,255,255,0.05);color:#555;border:1px solid rgba(255,255,255,0.08);}
.controls{display:flex;gap:10px;align-items:center;}
.controls button{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#aaa;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:0.82rem;font-weight:600;transition:all 0.2s;}
.controls button:hover{background:rgba(255,255,255,0.12);color:#fff;}
.controls button.fullscreen{background:rgba(78,205,196,0.1);border-color:rgba(78,205,196,0.2);color:#4ecdc4;}
.controls button.fullscreen:hover{background:rgba(78,205,196,0.2);}
.court-grid{display:grid;gap:16px;margin-bottom:28px;}
.court-grid.cols-1{grid-template-columns:1fr;}
.court-grid.cols-2{grid-template-columns:1fr 1fr;}
.court-grid.cols-3{grid-template-columns:1fr 1fr 1fr;}
.court-grid.cols-4{grid-template-columns:1fr 1fr 1fr 1fr;}
.court-grid.cols-5{grid-template-columns:1fr 1fr 1fr 1fr 1fr;}
.court-grid.cols-6{grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr;}
.court-card{background:linear-gradient(145deg,#13131e,#1a1a2e);border-radius:16px;padding:20px;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,0.06);transition:transform 0.2s,box-shadow 0.2s;}
.court-card:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,0.3);}
.court-card.available{border-color:rgba(78,205,196,0.15);}
.court-card.available .court-status{color:#4ecdc4;}
.court-card.occupied{border-color:rgba(52,152,219,0.2);}
.court-card.occupied .court-status{color:#3498db;}
.court-card.tournament{border-color:rgba(155,89,182,0.25);}
.court-card.tournament .court-status{color:#9b59b6;}
.court-card.maintenance{opacity:0.5;border-color:rgba(231,76,60,0.15);}
.court-card.maintenance .court-status{color:#e74c3c;}
.court-card.booked{border-color:rgba(241,196,15,0.2);}
.court-card.booked .court-status{color:#f1c40f;}
.court-card .color-bar.occupied{background:linear-gradient(90deg,#3498db,#2980b9);}
.court-card .color-bar.tournament{background:linear-gradient(90deg,#9b59b6,#8e44ad);}
.court-card .color-bar.maintenance{background:linear-gradient(90deg,#e74c3c,#c0392b);}
.court-card .color-bar.booked{background:linear-gradient(90deg,#f1c40f,#f39c12);}
.usage-badge{font-size:0.65rem;font-weight:700;padding:3px 10px;border-radius:12px;display:inline-block;letter-spacing:0.5px;}
.usage-badge.openplay{background:rgba(52,152,219,0.12);color:#3498db;border:1px solid rgba(52,152,219,0.2);}
.usage-badge.tournament{background:rgba(155,89,182,0.12);color:#9b59b6;border:1px solid rgba(155,89,182,0.2);}
.usage-badge.booking{background:rgba(241,196,15,0.12);color:#f1c40f;border:1px solid rgba(241,196,15,0.2);}
.court-card .color-bar{position:absolute;top:0;left:0;right:0;height:3px;}
.court-card .color-bar.available{background:linear-gradient(90deg,#4ecdc4,#2ecc71);}
.court-card .color-bar.occupied{background:linear-gradient(90deg,#3498db,#2980b9);}
.court-card .color-bar.maintenance{background:linear-gradient(90deg,#e74c3c,#c0392b);}
.court-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.court-name{font-size:1.15rem;font-weight:700;}
.court-status{font-size:0.78rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;}
.court-meta{font-size:0.75rem;color:#666;display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px;}
.court-players{display:flex;gap:16px;margin-top:6px;}
.court-players .team{flex:1;}
.court-players .team-label{font-size:0.68rem;text-transform:uppercase;letter-spacing:1px;color:#666;margin-bottom:4px;font-weight:600;}
.court-players .team-label.team-a{color:#4ecdc4;}
.court-players .team-label.team-b{color:#e74c3c;}
.player-avatar{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.04);padding:4px 10px 4px 6px;border-radius:20px;margin:2px;}
.player-avatar .dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.player-avatar .name{font-size:0.85rem;font-weight:600;}
.player-avatar .skill{font-size:0.7rem;color:#666;margin-left:2px;}
.rr-round{font-size:0.72rem;color:#f39c12;background:rgba(243,156,18,0.1);padding:3px 10px;border-radius:12px;display:inline-block;font-weight:600;}
.bottom-row{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:8px;}
.queue-panel,.results-panel,.tournament-panel{background:linear-gradient(145deg,#13131e,#1a1a2e);border-radius:16px;padding:20px;border:1px solid rgba(255,255,255,0.06);}
.right-column{display:flex;flex-direction:column;gap:24px;}
.panel-title{font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#f39c12;margin-bottom:12px;}
.queue-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.queue-item:last-child{border-bottom:none;}
.queue-item .q-name{font-size:0.85rem;font-weight:600;}
.queue-item .q-meta{font-size:0.72rem;color:#666;}
.queue-item .q-wait{font-size:0.72rem;color:#f39c12;font-weight:600;}
.empty-msg{color:#444;font-size:0.85rem;text-align:center;padding:20px 0;}
.none-msg{color:#333;font-size:0.78rem;text-align:center;padding:8px 0;}
.result-item{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.result-item:last-child{border-bottom:none;}
.result-item .r-players{font-size:0.82rem;font-weight:600;}
.result-item .r-winner{font-size:0.75rem;color:#4ecdc4;font-weight:600;}
.result-item .r-score{font-size:0.75rem;color:#f39c12;font-weight:700;}
.result-item .r-time{font-size:0.65rem;color:#555;margin-left:6px;}
.tournament-match{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:0.82rem;}
.tournament-match:last-child{border-bottom:none;}
.tournament-match .t-players{display:flex;gap:8px;align-items:center;}
.tournament-match .t-stage{font-size:0.68rem;color:#666;text-transform:uppercase;}
.leaderboard-scroll{max-height:300px;overflow-y:auto;}
.leaderboard-scroll::-webkit-scrollbar{width:4px;}
.leaderboard-scroll::-webkit-scrollbar-track{background:transparent;}
.leaderboard-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px;}
@media(max-width:1200px){.court-grid.cols-4,.court-grid.cols-5,.court-grid.cols-6{grid-template-columns:1fr 1fr 1fr;}}

/* Timeline for TV */
.tv-timeline-wrap{margin-bottom:28px;}
.tv-timeline-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.tv-timeline-scroll{overflow-x:auto;overflow-y:hidden;}
.tv-timeline-scroll::-webkit-scrollbar{height:6px;}
.tv-timeline-scroll::-webkit-scrollbar-track{background:rgba(255,255,255,0.03);border-radius:3px;}
.tv-timeline-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}
.tv-timeline-scroll .timeline-grid{min-width:800px;background:linear-gradient(145deg,rgba(0,0,0,0.3),rgba(0,0,0,0.15));border-radius:14px;padding:16px;border:1px solid rgba(255,255,255,0.06);}
.tv-timeline-scroll .tl-hours{display:flex;margin-left:100px;margin-bottom:8px;}
.tv-timeline-scroll .tl-hour{flex:1;font-size:0.6rem;color:#555;text-align:center;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;}
.tv-timeline-scroll .tl-row{display:flex;align-items:center;margin-bottom:5px;height:32px;border-radius:6px;}
.tv-timeline-scroll .tl-label{width:100px;font-size:0.72rem;font-weight:700;flex-shrink:0;padding-right:8px;}
.tv-timeline-scroll .tl-slots{flex:1;height:100%;position:relative;background:rgba(255,255,255,0.03);border-radius:6px;overflow:hidden;border:1px solid rgba(255,255,255,0.04);}
.tv-timeline-scroll .tl-slot{position:absolute;top:2px;bottom:2px;border-radius:4px;display:flex;align-items:center;padding:0 6px;font-size:0.6rem;font-weight:700;white-space:nowrap;overflow:hidden;text-shadow:0 1px 3px rgba(0,0,0,0.4);z-index:2;}
.tv-timeline-scroll .tl-op{background:linear-gradient(135deg,rgba(78,205,196,0.35),rgba(78,205,196,0.15));color:#4ecdc4;border:1px solid rgba(78,205,196,0.4);}
.tv-timeline-scroll .tl-tournament{background:linear-gradient(135deg,rgba(155,89,182,0.35),rgba(155,89,182,0.15));color:#d4a5e8;border:1px solid rgba(155,89,182,0.4);}
.tv-timeline-scroll .tl-booked{background:linear-gradient(135deg,rgba(231,76,60,0.4),rgba(231,76,60,0.15));color:#ff8a80;border:1px solid rgba(231,76,60,0.4);}
.tv-timeline-scroll .tl-playing{background:linear-gradient(135deg,rgba(46,204,113,0.4),rgba(46,204,113,0.15));color:#69f0ae;border:1px solid rgba(46,204,113,0.4);}
.tv-timeline-scroll .tl-gridline{position:absolute;top:0;bottom:0;width:1px;background:rgba(255,255,255,0.04);z-index:0;}
.tv-timeline-scroll .tl-now{position:absolute;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#f39c12,#e74c3c);z-index:5;box-shadow:0 0 10px rgba(243,156,18,0.4);}
.tv-timeline-scroll .tl-now-lbl{position:absolute;top:-16px;font-size:0.55rem;color:#f39c12;transform:translateX(-50%);font-weight:800;text-shadow:0 0 8px rgba(243,156,18,0.4);}
</style>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBWqvEMy-q_DJWGYhOJfHsRrFQNl3ZJK9Y",
  authDomain: "courtq-2e744.firebaseapp.com",

  storageBucket: "courtq-2e744.firebasestorage.app",
  messagingSenderId: "4841304416",
  appId: "1:4841304416:web:7a26d85566af1d47d4ee05"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const SKILL_LABELS={2:'Beginner',3:'Intermediate',4:'Advanced',5:'Pro'};
let VENUE_ID = null;
let unsub = null;

function phtNow(){
    const d=new Date();
    d.setMinutes(d.getMinutes()+d.getTimezoneOffset()+480);
    return d;
}

function updateClock(){
    document.getElementById('clockDisplay').textContent=phtNow().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',timeZone:'Asia/Manila'});
}
setInterval(updateClock,1000);updateClock();

function toggleFullscreen(){
    if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(()=>{});}
    else{document.exitFullscreen().catch(()=>{});}
}

function getCourtCols(n){
    if(n<=3) return n;
    if(n<=4) return 4;
    if(n<=6) return 6;
    return 6;
}

function getGTLabel(gt){return gt==='singles'?'1v1':gt==='doubles'?'2v2':gt||'—';}
function getWait(m){if(m<1)return '<1m';if(m<60)return m+'m';const h=Math.floor(m/60);return h+'h'+(m%60?m%60+'m':'')}

function getTimeMins(t){
    if(!t) return -1;
    const parts=t.split(':').map(Number);
    return parts[0]*60+(parts[1]||0);
}

function isBookingActive(b, now){
    if(b.status==='cancelled'||b.status==='completed') return false;
    const today=phtNow().toISOString().slice(0,10);
    if(b.date!==today) return false;
    const nowMins=now.getHours()*60+now.getMinutes();
    const startM=getTimeMins(b.startTime);
    const endM=getTimeMins(b.endTime);
    return nowMins>=startM&&nowMins<endM;
}

function isBookingUpcoming(b, now){
    if(b.status==='cancelled'||b.status==='completed'||b.status==='active') return false;
    const today=phtNow().toISOString().slice(0,10);
    if(b.date!==today) return false;
    const nowMins=now.getHours()*60+now.getMinutes();
    const startM=getTimeMins(b.startTime);
    return startM>nowMins&&startM-nowMins<=120;
}

function nextBooking(b, now, bookings){
    // Already handled by isBookingActive/Upcoming per court
    return null;
}

// ── Timeline helpers ──
function escapeHtml(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getTodayISO(){return phtNow().toISOString().split('T')[0];}
function timeToMin(t){if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+m;}
function minToTime(m){const h=Math.floor(m/60),mn=m%60;return `${String(h).padStart(2,'0')}:${String(mn).padStart(2,'0')}`;}
function nowMin(){const n=phtNow();return n.getHours()*60+n.getMinutes();}

function inSessionTV(date,sMin,eMin,courtId,session){
    if(!session||!session.active) return false;
    if(courtId!=null&&session.courts&&!session.courts.includes(courtId)) return false;
    const sd=session.startDate||date,ed=session.endDate||sd;
    const ss=timeToMin(session.startTime||session.start),se=timeToMin(session.endTime||session.end);
    if(date<sd||date>ed) return false;
    if(sd===ed) return sMin<se&&eMin>ss;
    if(date===sd) return eMin>ss;
    if(date===ed) return sMin<se;
    return true;
}

function getBookingsForCourtTV(cId,date,sMin,eMin,bookings){
    return bookings.filter(b=>{
        if(b.courtId!==cId||b.date!==date||b.status==='cancelled') return false;
        const bs=timeToMin(b.startTime),be=timeToMin(b.endTime);
        return sMin<be&&eMin>bs;
    });
}

let lastData=null;
let showTimeline=false;

function toggleTimeline(){
    showTimeline=!showTimeline;
    const wrap=document.getElementById('tvTimelineWrap');
    wrap.style.display=showTimeline?'block':'none';
    document.getElementById('tlToggleBtn').textContent=showTimeline?'⊞ Live':'📅 Schedule';
    if(showTimeline&&lastData) renderTVTimeline(lastData);
}

function renderTVTimeline(data){
    const grid=document.getElementById('tvTlGrid');
    if(!grid) return;
    const date=getTodayISO();
    const courts=data.courts||[];
    const bookings=data.bookings||[];
    const session=data.session;
    const sH=0,eH=23,total=24;
    const nMin=nowMin();
    let html=`<div class="tl-hours">`;
    for(let h=sH;h<=eH;h++) html+=`<div class="tl-hour">${h%12||12}${h<12?'am':'pm'}</div>`;
    html+='</div>';
    const pct=t=>((timeToMin(t)-sH*60)/(total*60))*100;
    let gridlines='';
    for(let h=1;h<=eH;h++) gridlines+=`<div class="tl-gridline" style="left:${(h/total)*100}%;"></div>`;
    courts.forEach(court=>{
        let slots=gridlines;
        const tournamentInfo=(()=>{
            if(!court._tournamentId) return null;
            const t=(data.tournaments||[]).find(x=>x.id===court._tournamentId);
            if(!t||t.status==='completed') return null;
            return {name:t.name,status:t.status};
        })();
        if(tournamentInfo) slots+=`<div class="tl-slot tl-tournament" style="left:0%;width:100%;">🔮 ${tournamentInfo.name}</div>`;
        if(session&&session.active&&inSessionTV(date,sH*60,(eH+1)*60,court.id,session)){
            const ss=timeToMin(session.startTime||session.start),se=timeToMin(session.endTime||session.end);
            const sd=session.startDate||date,ed=session.endDate||sd;
            const sesStart=sd!==ed&&date===ed?0:Math.max(ss,sH*60);
            const sesEnd=sd!==ed&&date===sd?24*60:Math.min(se,(eH+1)*60);
            const bks=getBookingsForCourtTV(court.id,date,sesStart,sesEnd,bookings).sort((a,b)=>timeToMin(a.startTime)-timeToMin(b.startTime));
            let cur=sesStart;
            bks.forEach(b=>{
                const bs=timeToMin(b.startTime),be=timeToMin(b.endTime);
                if(cur<bs) slots+=`<div class="tl-slot tl-op" style="left:${pct(minToTime(cur))}%;width:${Math.min(((bs-cur)/(total*60))*100,100)}%;">Open Play</div>`;
                slots+=`<div class="tl-slot tl-booked" style="left:${pct(b.startTime)}%;width:${((be-bs)/(total*60))*100}%;">${escapeHtml(b.customerName||b.customer||'Guest')}</div>`;
                cur=be;
            });
            if(cur<sesEnd) slots+=`<div class="tl-slot tl-op" style="left:${pct(minToTime(cur))}%;width:${Math.min(((sesEnd-cur)/(total*60))*100,100)}%;">Open Play</div>`;
        } else {
            bookings.filter(b=>b.courtId===court.id&&b.date===date&&b.status!=='cancelled').forEach(b=>{
                const bs=timeToMin(b.startTime),be=timeToMin(b.endTime);
                slots+=`<div class="tl-slot tl-booked" style="left:${pct(b.startTime)}%;width:${((be-bs)/(total*60))*100}%;">${escapeHtml(b.customerName||b.customer||'Guest')}</div>`;
            });
        }
        if(court.status==='occupied'&&court.startTime){
            const el=Math.floor((Date.now()-court.startTime)/60000);
            const ps=nMin-el;
            const l=((ps-sH*60)/(total*60))*100;
            const w=(el/(total*60))*100;
            if(l>=0) slots+=`<div class="tl-slot tl-playing" style="left:${l}%;width:${Math.max(w,0.5)}%;">Playing</div>`;
        }
        const nowLine=`<div class="tl-now" style="left:${((nMin-sH*60)/(total*60))*100}%;"><span class="tl-now-lbl">NOW</span></div>`;
        html+=`<div class="tl-row"><div class="tl-label" style="color:${court.color||'#fff'};">${court.name}</div><div class="tl-slots">${slots}${nowLine}</div></div>`;
    });
    grid.innerHTML=html;
    const scrollWrap=document.querySelector('.tv-timeline-scroll');
    if(scrollWrap){
        const scrollPct=nMin/(24*60);
        scrollWrap.scrollLeft=scrollWrap.scrollWidth*scrollPct-scrollWrap.clientWidth/2;
    }
}

function render(data){
    const courts=data.courts||[];
    const queue=data.queue||[];
    const soloQueue=data.soloQueue||[];
    const session=data.session;
    const tournaments=data.tournaments||[];
    const bookings=data.bookings||[];
    const now=phtNow();

    // Venue name
    document.getElementById('venueName').textContent=data.venueName||'—';

    // Session badge
    const sb=document.getElementById('sessionBadge');
    if(session&&session.active){
        const modeLabels={winnersSplit:'Winners Split',roundRobin:'Round Robin',fourOnFour:'4 on/4 off'};
        const ml=modeLabels[session.mode]||session.mode||'Open Play';
        sb.textContent='● '+ml;
        sb.className='session-badge active';
    } else {
        sb.textContent='○ No Active Session';
        sb.className='session-badge inactive';
    }

    // Classify each court's usage type
    const activeBookings={};
    const upcomingBookings={};
    bookings.forEach(b=>{
        if(isBookingActive(b,now)){
            if(!activeBookings[b.courtId]) activeBookings[b.courtId]=[];
            activeBookings[b.courtId].push(b);
        }
        if(isBookingUpcoming(b,now)){
            if(!upcomingBookings[b.courtId]) upcomingBookings[b.courtId]=[];
            upcomingBookings[b.courtId].push(b);
        }
    });
    // Courts grid
    const grid=document.getElementById('courtGrid');
    grid.className='court-grid cols-'+getCourtCols(courts.length);
    grid.innerHTML=courts.map(c=>{
        const occ=c.status==='occupied';
        const maint=c.status==='maintenance';
        const isTournament=occ&&c._tournamentId;
        const isOpenPlay=occ&&!c._tournamentId&&session&&session.active;
        const isBookingOcc=occ&&!c._tournamentId&&(!session||!session.active);
        const hasActiveBookings=activeBookings[c.id]&&activeBookings[c.id].length>0;
        const hasUpcoming=upcomingBookings[c.id]&&upcomingBookings[c.id].length>0;
        const cardType=maint?'maintenance':isTournament?'tournament':isOpenPlay?'occupied':(isBookingOcc||hasActiveBookings)?'booked':c.status;

        // Usage badge
        let usageBadge='';
        if(isTournament) usageBadge='<span class="usage-badge tournament">🏆 Tournament</span>';
        else if(isOpenPlay) usageBadge='<span class="usage-badge openplay">🎯 Open Play</span>';
        else if(isBookingOcc||hasActiveBookings) usageBadge='<span class="usage-badge booking">📅 Booking</span>';

        // Players
        const isSingles=c.gameType==='singles';
        const mid=Math.ceil(c.players.length/2);
        const teamA=c.team1||c.players.slice(0,mid);
        const teamB=c.team2||c.players.slice(mid);
        let playersHTML='';
        if(occ&&c.players.length>0){
            if(isSingles||c.players.length<=2){
                playersHTML=`
                    <div class="court-players" style="justify-content:center;">
                        ${c.players.map((p,i)=>`<span class="player-avatar"><span class="dot" style="background:${p.color||(i===0?'#4ecdc4':'#e74c3c')}"></span><span class="name">${p.name}</span></span>`).join('<span style="color:#444;font-weight:700;">vs</span>')}
                    </div>`;
            } else {
                playersHTML=`
                    <div class="court-players">
                        <div class="team">
                            <div class="team-label team-a">● Team A</div>
                            ${teamA.map(p=>`<span class="player-avatar"><span class="dot" style="background:${p.color||'#4ecdc4'}"></span><span class="name">${p.name}<span class="skill">${p.skill||'?'}.0</span></span></span>`).join('')}
                        </div>
                        <div class="team">
                            <div class="team-label team-b">● Team B</div>
                            ${teamB.map(p=>`<span class="player-avatar"><span class="dot" style="background:${p.color||'#e74c3c'}"></span><span class="name">${p.name}<span class="skill">${p.skill||'?'}.0</span></span></span>`).join('')}
                        </div>
                    </div>`;
            }
        }
        // Active booking details
        let bookingHTML='';
        if(hasActiveBookings){
            bookingHTML=activeBookings[c.id].map(b=>`
                <div style="font-size:0.78rem;color:#f1c40f;margin-top:6px;padding:6px 10px;background:rgba(241,196,15,0.06);border-radius:8px;border:1px solid rgba(241,196,15,0.1);">
                    📅 ${b.customerName||'Guest'} · ${b.startTime}-${b.endTime}
                </div>`).join('');
        } else if(hasUpcoming){
            bookingHTML=upcomingBookings[c.id].slice(0,2).map(b=>`
                <div style="font-size:0.72rem;color:#f39c12;margin-top:4px;opacity:0.7;">
                    ⏳ ${b.startTime} ${b.customerName?'· '+b.customerName:''}
                </div>`).join('');
        }

        const rrHTML=c.rr?`<span class="rr-round" style="margin-top:6px;">🔄 Round ${c.rr.round+1}/3</span>`:'';
        const statusLabel=maint?'● Maintenance':isTournament?'● Tournament':isOpenPlay?'● In Play':(isBookingOcc||hasActiveBookings)?'● Booked':c.status==='available'?'● Available':'—';

        return `
            <div class="court-card ${cardType}">
                <div class="color-bar ${cardType}"></div>
                <div class="court-header">
                    <span class="court-name" style="color:${c.color||'#fff'}">${c.name}</span>
                    <span style="display:flex;align-items:center;gap:6px;">
                        ${usageBadge}
                        <span class="court-status">${statusLabel}</span>
                    </span>
                </div>
                <div class="court-meta">
                    ${c.location?`<span>📍 ${c.location}</span>`:''}
                    ${occ&&c.gameType?`<span>🎮 ${getGTLabel(c.gameType)}</span>`:''}
                    ${c.rate?`<span>₱${c.rate}</span>`:''}
                    ${isOpenPlay&&c.startTime?`<span>⏱ ${Math.floor((Date.now()-c.startTime)/60000)}m</span>`:''}
                </div>
                ${occ?playersHTML:''}
                ${rrHTML}
                ${bookingHTML}
                ${maint?'<div style="font-size:0.78rem;color:#e74c3c;margin-top:8px;text-align:center;">🔧 Under Maintenance</div>':''}
                ${cardType==='available'?'<div style="font-size:1.2rem;text-align:center;padding:12px 0;opacity:0.3;">✓ Available</div>':''}
                ${!occ&&!maint&&cardType==='booked'&&!hasActiveBookings&&!hasUpcoming?'<div style="font-size:0.9rem;text-align:center;padding:12px 0;opacity:0.3;">—</div>':''}
            </div>`;
    }).join('');

    // Queue
    const ql=document.getElementById('queueList');
    const totalQ=queue.filter(g=>!g._halfTeam).length;
    const soloCount=soloQueue.reduce((a,s)=>a+s.players.length,0);
    const poolMode=session&&(session.mode==='winnersSplit'||session.mode==='roundRobin');
    if(poolMode){
        // Round-robin with schedule — show standings instead of pool
        if(session.mode==='roundRobin'&&session.rrSchedule){
            const s=session.rrSchedule;
            const done=s.matches.filter(m=>m.completed).length;
            if(s.completed){
                const sorted=[...s.teams].sort((a,b)=>b.wins-a.wins||a.losses-b.losses||(b.pointsFor-b.pointsAgainst)-(a.pointsFor-a.pointsAgainst));
                ql.innerHTML=`<div style="font-size:0.7rem;color:#2ecc71;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">🏆 Round Robin Complete</div>
                    <div style="background:rgba(46,204,113,0.1);border-radius:6px;padding:6px 10px;margin-bottom:6px;font-weight:700;color:#2ecc71;font-size:0.82rem;">Winner: ${sorted[0].name}</div>
                    ${s.teams.map((t,i)=>`<div style="display:flex;justify-content:space-between;font-size:0.78rem;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04);"><span>${i+1}. ${t.name}</span><span style="color:#aaa;">${t.wins}W/${t.losses}L${t.draws?'/'+t.draws+'D':''} ${t.pointsFor}-${t.pointsAgainst}</span></div>`).join('')}`;
            } else {
                ql.innerHTML=`<div style="font-size:0.68rem;color:#9b59b6;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">🔄 Round Robin · ${done}/${s.matches.length}</div>
                    <div style="font-size:0.7rem;color:#888;margin-bottom:6px;">${s.teams.length} ${session.rrGameType==='singles'?'players':'teams'}</div>
                    ${s.teams.map(t=>`<div style="display:flex;justify-content:space-between;font-size:0.78rem;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04);"><span>${t.name}</span><span style="color:#aaa;">${t.wins}W/${t.losses}L${t.draws?'/'+t.draws+'D':''} ${t.pointsFor}-${t.pointsAgainst}</span></div>`).join('')}`;
            }
        } else if(soloCount===0){
            ql.innerHTML='<div class="empty-msg">Pool is empty</div>';
        } else {
            const entries=session.mode==='roundRobin'&&session.rrGameType==='singles'
                ?soloQueue.map(e=>`<div class="queue-item"><span class="q-name">${e.players.map(p=>p.name).join(', ')}</span><span class="q-wait">waiting</span></div>`).join('')
                :soloQueue.map(e=>{
                    const label=e._halfTeam?'👫 '+e.players.map(p=>p.name).join(' & '):e._solo?'🙋 '+e.players[0].name:e.players.map(p=>p.name).join(', ');
                    const skill=e.players[0]?SKILL_LABELS[e.skillLevel]||'—':'—';
                    return `<div class="queue-item"><span class="q-name">${label}</span><span class="q-meta">⭐${skill}</span><span class="q-wait">${getWait(Math.floor((Date.now()-e.joinedAt)/60000))}</span></div>`;
                }).join('');
            ql.innerHTML=entries+'<div class="queue-item" style="color:#f39c12;font-size:0.72rem;font-weight:600;">👥 '+soloCount+' player'+(soloCount>1?'s':'')+' in pool</div>';
        }
    } else {
        const full=queue.filter(g=>!g._halfTeam);
        if(full.length===0&&soloCount===0){ql.innerHTML='<div class="empty-msg">Queue is empty</div>';}
        else {
            let html='';
            full.forEach((g,i)=>{
                const name=g.groupName||g.players.map(p=>p.name).join(' & ');
                const meta=getGTLabel(g.gameType)+' · ⭐'+(SKILL_LABELS[g.skillLevel]||'?');
                const wait=getWait(Math.floor((Date.now()-g.joinedAt)/60000));
                if(i===0&&full.length>0) html+=`<div class="queue-item" style="border:1px solid rgba(78,205,196,0.2);border-radius:8px;padding:10px;margin-bottom:6px;"><span class="q-name" style="color:#4ecdc4;font-size:0.9rem;">▶ ${name}</span><span class="q-wait" style="font-size:0.82rem;">Next Up</span></div>`;
                else html+=`<div class="queue-item"><span class="q-name">${name}</span><span class="q-meta">${meta}</span><span class="q-wait">${wait}</span></div>`;
            });
            if(soloCount>0){
                html+='<div class="queue-item"><span class="q-name" style="color:#f39c12;">⏳ '+soloCount+' waiting for partner</span></div>';
            }
            ql.innerHTML=html;
        }
    }

    // Recent Results — collect history from all courts and global history
    const rl=document.getElementById('resultsList');
    const allHistory=[];
    courts.forEach(c=>{
        (c.history||[]).forEach(h=>{
            allHistory.push({courtName:c.name,courtId:c.id,courtColor:c.color,...h});
        });
    });
    (data.history||[]).forEach(h=>{
        allHistory.push({...h,courtName:h.court,courtColor:'#555'});
    });
    allHistory.sort((a,b)=>{
        const ta=a.timestamp||0;
        const tb=b.timestamp||0;
        return tb-ta;
    });
    const top=allHistory.slice(0,8);
    if(top.length===0){rl.innerHTML='<div class="empty-msg">No completed games yet</div>';}
    else {
        rl.innerHTML=top.map(h=>{
            const wt=h.winner==='A'?h.teamA:h.winner==='B'?h.teamB:null;
            const winnerName=wt?(Array.isArray(wt)?wt.map(p=>p.name).join(' & '):''):'—';
            const scoreText=(h.scoreA!=null&&h.scoreB!=null)?`${h.scoreA}-${h.scoreB}`:'';
            const timeStr=h.timestamp?(()=>{
                const d=new Date(h.timestamp);
                if(isNaN(d.getTime()))return'';
                return d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Manila'});
            })():'';
            const playersStr=h.players?h.players.map(p=>typeof p==='string'?p:(p.name||'')).join(' vs '):'';
            return `<div class="result-item"><span class="r-players" style="border-left:3px solid ${h.courtColor||'#555'};padding-left:8px;">${h.courtName?h.courtName+': ':''}${playersStr||'—'}</span><span><span class="r-winner">🏆 ${winnerName}</span>${scoreText?' <span class="r-score">'+scoreText+'</span>':''}${timeStr?' <span class="r-time">'+timeStr+'</span>':''}</span></div>`;
        }).join('');
    }

    // Tournament
    const tl=document.getElementById('tournamentList');
    const activeTour=tournaments.find(t=>t.status==='active');
    if(!activeTour){tl.innerHTML='<div class="empty-msg">No active tournament</div>';}
    else {
        const groups=activeTour.groups||[];
        const elim=activeTour.elimination||[];
        // Find tournament matches currently on courts
        const tourCourts=courts.filter(c=>c._tournamentId===activeTour.id);
        let html=`<div style="font-size:0.82rem;font-weight:700;color:#9b59b6;margin-bottom:8px;">🏆 ${activeTour.name}</div>`;
        if(tourCourts.length>0){
            html+=`<div style="font-size:0.72rem;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;">Live on Court</div>`;
            html+=tourCourts.map(c=>{
                const p=c.players||[];
                return `<div class="tournament-match"><span class="t-players">🔮 ${c.name}: ${p.map(p=>p.name).join(' vs ')}</span></div>`;
            }).join('');
        }
        if(groups.length>0){
            html+=`<div style="font-size:0.72rem;color:#f39c12;margin-top:8px;font-weight:600;text-transform:uppercase;letter-spacing:1px;">Groups</div>`;
            html+=groups.map(g=>`<div style="font-size:0.75rem;color:#888;margin-bottom:2px;">📊 ${g.name}: ${g.players.map(p=>p.name).join(', ')}</div>`).join('');
        }
        if(elim.length>0){
            html+=`<div style="font-size:0.72rem;color:#f39c12;margin-top:8px;font-weight:600;text-transform:uppercase;letter-spacing:1px;">Elimination</div>`;
            html+=elim.slice(0,10).map(m=>{
                const p=m.players||[];
                const s=m.score?`${m.scoreA||0}-${m.scoreB||0}`:'';
                const courtName=courts.find(c=>c.id===m.courtId)?.name||m.courtName||'';
                return `<div class="tournament-match"><span class="t-players">${p.map(p=>p.name).join(' vs ')||'TBD'}</span><span style="font-size:0.72rem;color:#888;">${m.stage||'—'}${s?' · '+s:''}${courtName?' · '+courtName:''}</span></div>`;
            }).join('');
        }
        if(!tourCourts.length&&!groups.length&&!elim.length) html+='<div class="empty-msg">Setting up...</div>';
        tl.innerHTML=html;
    }
    lastData=data;
    if(showTimeline) renderTVTimeline(data);
}

async function init(){
    const params=new URLSearchParams(window.location.search);
    let venueSlug=params.get('venue');
    if(!venueSlug){
        const pathParts=window.location.pathname.split('/').filter(Boolean);
        if(pathParts.length>=2&&pathParts[1]==='tv') venueSlug=pathParts[0];
    }
    if(!venueSlug){
        document.getElementById('app').innerHTML='<div style="text-align:center;padding:80px 20px;"><img src="./Logo.jpg" alt="" style="height:48px;margin-bottom:20px;opacity:0.5;"><h2 style="color:#888;margin-bottom:10px;">Live TV</h2><p style="color:#555;">Add <code style="background:rgba(255,255,255,0.06);padding:4px 10px;border-radius:6px;">?venue=your-slug</code> to the URL.</p></div>';
        return;
    }
    try {
        const slugDoc=await db.collection('slugs').doc(venueSlug).get();
        if(!slugDoc.exists){document.getElementById('app').innerHTML='<div style="text-align:center;padding:80px 20px;color:#e74c3c;">❌ Venue not found</div>';return;}
        VENUE_ID=slugDoc.data().venueId;
        document.title='CourtQ Live · '+venueSlug;
        unsub=db.collection('venues').doc(VENUE_ID).onSnapshot(snap=>{
            if(snap.exists) render(snap.data());
        },err=>{
            console.warn('onSnapshot error:',err);
            // Fallback: poll every 3s
            if(unsub){unsub();unsub=null;}
            setInterval(async()=>{
                try{const doc=await db.collection('venues').doc(VENUE_ID).get();if(doc.exists)render(doc.data());}catch(e){}
            },3000);
        });
    } catch(e){
        document.getElementById('app').innerHTML='<div style="text-align:center;padding:80px 20px;color:#e74c3c;">❌ Error loading venue</div>';
    }
}
init();
</script>
